<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Pododong</title>
    <script>
      var pathSegmentsToKeep = 1;
      var routePath = window.location.pathname
        .slice(1)
        .split('/')
        .slice(pathSegmentsToKeep)
        .join('/')
        .replace(/&/g, '~and~');
      var query = window.location.search ? '&' + window.location.search.slice(1).replace(/&/g, '~and~') : '';
      var redirectUrl =
        window.location.origin +
        window.location.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?/' +
        routePath +
        query +
        window.location.hash;

      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
